<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPA Calculator – UCSC Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon: #8b0000;
      --maroon-dark: #6b0000;
      --gold: #c9a84c;
      --gold-light: #f0c040;
      --bg: #f5f3ee;
      --text: #1a1a1a;
      --muted: #888;
      --card: #ffffff;
      --border: #e0dbd0;
      --input-bg: #faf9f6;
    }
    body.dark {
      --bg: #141414;
      --text: #f0ede8;
      --muted: #777;
      --card: #1e1e1e;
      --border: #333;
      --input-bg: #252525;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
      transition: background 0.3s, color 0.3s;
      animation: fadeIn 0.5s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container { max-width: 620px; margin: 0 auto; }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--maroon);
      letter-spacing: -0.02em;
    }
    .dark-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
    }

    /* GPA Result banner */
    .gpa-banner {
      background: var(--maroon);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .gpa-banner-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.3rem;
    }
    .gpa-value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.6rem;
      color: var(--gold-light);
      line-height: 1;
      letter-spacing: -0.02em;
      transition: all 0.4s;
    }
    .gpa-grade {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.8);
      margin-top: 0.2rem;
    }
    .gpa-stats {
      text-align: right;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.8;
    }
    .gpa-stats strong { color: rgba(255,255,255,0.85); }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 3px 16px rgba(0,0,0,0.05);
      margin-bottom: 1.25rem;
      transition: background 0.3s;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--maroon);
      margin-bottom: 1rem;
    }

    /* Course rows */
    .course-header {
      display: grid;
      grid-template-columns: 1fr 90px 110px 36px;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 0 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.6rem;
    }
    .courses-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .course-row {
      display: grid;
      grid-template-columns: 1fr 90px 110px 36px;
      gap: 0.5rem;
      align-items: center;
      animation: rowIn 0.25s ease both;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    input, select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--maroon); }

    .btn-remove {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 36px; height: 36px;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-remove:hover {
      border-color: #cc3333;
      color: #cc3333;
      background: #fff0f0;
    }

    /* Action buttons */
    .btn-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .btn {
      padding: 0.6rem 1.3rem;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-add     { background: var(--border); color: var(--text); }
    .btn-add:hover { background: #d5cfc5; }
    .btn-calc    { background: var(--maroon); color: #fff; }
    .btn-calc:hover { background: var(--maroon-dark); }
    .btn-clear   { background: none; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-clear:hover { color: #cc3333; border-color: #cc3333; }

    /* Letter grade reference */
    .grade-ref {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem;
      font-size: 0.75rem;
    }
    .grade-ref-item {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.35rem 0.5rem;
      text-align: center;
      color: var(--muted);
    }
    .grade-ref-item strong { color: var(--maroon); display: block; font-size: 0.85rem; }

    @media (max-width: 480px) {
      .course-header, .course-row {
        grid-template-columns: 1fr 70px 90px 32px;
      }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="page-header">
    <h1>🎓 GPA Calculator</h1>
    <button class="dark-toggle" onclick="document.body.classList.toggle('dark')">🌙 Dark</button>
  </div>

  <!-- GPA Banner -->
  <div class="gpa-banner">
    <div>
      <div class="gpa-banner-label">Cumulative GPA</div>
      <div class="gpa-value" id="gpaDisplay">—</div>
      <div class="gpa-grade" id="gpaGrade">Add courses below</div>
    </div>
    <div class="gpa-stats" id="gpaStats">
      <div>Total Credits: <strong id="totalCredits">0</strong></div>
      <div>Courses: <strong id="totalCourses">0</strong></div>
      <div>Quality Pts: <strong id="totalQP">0</strong></div>
    </div>
  </div>

  <!-- Course Entry -->
  <div class="card">
    <div class="card-title">Courses</div>
    <div class="course-header">
      <span>Course Name</span>
      <span>Credits</span>
      <span>Grade</span>
      <span></span>
    </div>
    <div class="courses-list" id="coursesList"></div>
    <div class="btn-row">
      <button class="btn btn-add" onclick="addRow()">+ Add Course</button>
      <button class="btn btn-calc" onclick="calculate()">Calculate GPA</button>
      <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <!-- Grade Reference -->
  <div class="card">
    <div class="card-title">Grade Scale Reference</div>
    <div class="grade-ref">
      <div class="grade-ref-item"><strong>A+/A</strong>4.0</div>
      <div class="grade-ref-item"><strong>A−</strong>3.7</div>
      <div class="grade-ref-item"><strong>B+</strong>3.3</div>
      <div class="grade-ref-item"><strong>B</strong>3.0</div>
      <div class="grade-ref-item"><strong>B−</strong>2.7</div>
      <div class="grade-ref-item"><strong>C+</strong>2.3</div>
      <div class="grade-ref-item"><strong>C</strong>2.0</div>
      <div class="grade-ref-item"><strong>C−</strong>1.7</div>
      <div class="grade-ref-item"><strong>D+</strong>1.3</div>
      <div class="grade-ref-item"><strong>D</strong>1.0</div>
      <div class="grade-ref-item"><strong>D−</strong>0.7</div>
      <div class="grade-ref-item"><strong>F</strong>0.0</div>
    </div>
  </div>

</div>

<script>
  const GRADE_MAP = {
    'A+': 4.0, 'A': 4.0, 'A-': 3.7,
    'B+': 3.3, 'B': 3.0, 'B-': 2.7,
    'C+': 2.3, 'C': 2.0, 'C-': 1.7,
    'D+': 1.3, 'D': 1.0, 'D-': 0.7,
    'F':  0.0
  };

  const GRADE_LABELS = {
    4.0: 'Summa Cum Laude ✨',
    3.7: 'Magna Cum Laude 🌟',
    3.3: 'Cum Laude 🎓',
    3.0: 'Good Standing',
    2.7: 'Satisfactory',
    2.3: 'Passing',
    2.0: 'Minimum Passing',
    0:   'Needs Improvement'
  };

  let rowId = 0;

  function gradeLabel(gpa) {
    for (const [threshold, label] of Object.entries(GRADE_LABELS).sort((a,b) => b[0]-a[0])) {
      if (gpa >= +threshold) return label;
    }
    return GRADE_LABELS[0];
  }

  function addRow(name = '', credits = '', grade = '') {
    const id = rowId++;
    const list = document.getElementById('coursesList');
    const row = document.createElement('div');
    row.className = 'course-row';
    row.id = 'row-' + id;

    const gradeOptions = Object.keys(GRADE_MAP).map(g =>
      `<option value="${g}" ${g === grade ? 'selected' : ''}>${g}</option>`
    ).join('');

    row.innerHTML = `
      <input type="text" placeholder="e.g. Mathematics" value="${name}"/>
      <input type="number" placeholder="3" min="1" max="6" value="${credits}" step="1"/>
      <select>${gradeOptions}</select>
      <button class="btn-remove" onclick="removeRow(${id})">✕</button>
    `;
    list.appendChild(row);
  }

  function removeRow(id) {
    const el = document.getElementById('row-' + id);
    if (el) el.remove();
  }

  function calculate() {
    const rows = document.querySelectorAll('.course-row');
    let totalQP = 0, totalCreds = 0, count = 0;

    rows.forEach(row => {
      const inputs  = row.querySelectorAll('input');
      const credits = parseFloat(inputs[1].value);
      const grade   = row.querySelector('select').value;
      if (!credits || credits <= 0 || !grade) return;
      const pts = GRADE_MAP[grade] ?? 0;
      totalQP += pts * credits;
      totalCreds += credits;
      count++;
    });

    const gpa = totalCreds > 0 ? (totalQP / totalCreds) : null;

    document.getElementById('gpaDisplay').textContent  = gpa !== null ? gpa.toFixed(2) : '—';
    document.getElementById('gpaGrade').textContent    = gpa !== null ? gradeLabel(gpa) : 'Add courses below';
    document.getElementById('totalCredits').textContent = totalCreds;
    document.getElementById('totalCourses').textContent = count;
    document.getElementById('totalQP').textContent      = totalQP.toFixed(1);
  }

  function clearAll() {
    document.getElementById('coursesList').innerHTML = '';
    document.getElementById('gpaDisplay').textContent  = '—';
    document.getElementById('gpaGrade').textContent    = 'Add courses below';
    document.getElementById('totalCredits').textContent = '0';
    document.getElementById('totalCourses').textContent = '0';
    document.getElementById('totalQP').textContent      = '0';
  }

  // Pre-load 3 sample courses
  addRow('Mathematics', '3', 'A');
  addRow('English Literature', '2', 'B+');
  addRow('Computer Science', '4', 'A-');
  calculate();
</script>
</body>
</html>
